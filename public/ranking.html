<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Classificação - Craks da Bola</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .ranking-container {
      padding: 20px;
      background: #0a0a0a;
      border-radius: 10px;
      box-shadow: 0 0 15px #00aaff55;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    th {
      background: #0d1b2a;
      color: #4af;
      font-size: 18px;
    }

    tr:hover {
      background: #112233;
    }

    .btn {
      padding: 10px 18px;
      background: #0077cc;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      margin-right: 10px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #0099ff;
    }
  </style>
</head>

<body>

<div class="content">

  <h1 style="color:#4af;">Classificação Geral</h1>

  <button class="btn" onclick="window.location.href='dashboard.html'">⬅ Voltar ao Dashboard</button>
  <button class="btn" onclick="recalcularTudo()">🔄 Recalcular Tudo</button>

  <div class="ranking-container">
    <table>
      <thead>
        <tr>
          <th>Posição</th>
          <th>Jogador</th>
          <th>Pontos</th>
        </tr>
      </thead>
      <tbody id="ranking-table"></tbody>
    </table>
  </div>

</div>

<script>
async function loadRanking() {
  const ranking = await fetch("/players").then(r => r.json());

  const tabela = document.getElementById("ranking-table");
  tabela.innerHTML = "";

  ranking.forEach((p, index) => {
    tabela.innerHTML += `
      <tr>
        <td>${index + 1}º</td>
        <td>${p.nome}</td>
        <td>${p.pontos}</td>
      </tr>
    `;
  });
}

async function recalcularTudo() {
  await fetch("/recalculate-all", { method: "POST" });
  alert("Ranking recalculado!");
  loadRanking();
}

loadRanking();
</script>

</body>
</html>
