<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Classificação Final</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #fafafa;
    }

    h1 {
      margin-bottom: 20px;
    }

    .section {
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    table, th, td {
      border: 1px solid #ddd;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }

    button {
      padding: 8px 15px;
      cursor: pointer;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <h1>Classificação Final</h1>

  <button onclick="window.location.href='dashboard.html'">Voltar ao Dashboard</button>

  <div class="section">
    <h2>Ranking</h2>

    <table>
      <thead>
        <tr>
          <th>Posição</th>
          <th>Jogador</th>
          <th>Pontos</th>
        </tr>
      </thead>
      <tbody id="ranking-table"></tbody>
    </table>
  </div>

<script>
  function loadRanking() {
    fetch("/ranking")
      .then(r => r.json())
      .then(ranking => {
        const tabela = document.getElementById("ranking-table");
        tabela.innerHTML = "";

        ranking.forEach((p, index) => {
          tabela.innerHTML += `
            <tr>
              <td>${index + 1}º</td>
              <td>${p.nome}</td>
              <td>${p.pontos}</td>
            </tr>
          `;
        });
      });
  }

  window.onload = loadRanking;
</script>

</body>
</html>
