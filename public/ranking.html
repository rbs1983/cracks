<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Ranking - Craks da Bola</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ⭐ SIDEBAR FUTURISTA -->
<div class="sidebar">

  <h2>Craks da Bola</h2>
  <ul>
    <li onclick="window.location.href='dashboard.html'">🏠 Craks da Bola</li>
  </ul>

  <h2>Liga Portuguesa</h2>
  <ul>
    <li onclick="window.location.href='ranking.html'">Classificação</li>
    <li onclick="window.location.href='dashboard.html#jogos'">Jogos</li>
    <li onclick="window.location.href='dashboard.html#prognosticos'">Prognósticos</li>
  </ul>

</div>

<!-- ⭐ CONTEÚDO PRINCIPAL -->
<div class="content">

  <h1>Classificação Geral</h1>

  <p style="margin-bottom:20px;">
    Ranking atualizado automaticamente com base nos prognósticos processados.
  </p>

  <table>
    <thead>
      <tr>
        <th>Posição</th>
        <th>Jogador</th>
        <th>Pontos</th>
      </tr>
    </thead>
    <tbody id="ranking-table"></tbody>
  </table>

</div>

<script>

// ⭐ CARREGAR RANKING
function loadRanking() {
  fetch("/players")
    .then(r => r.json())
    .then(players => {

      // Ordenar por pontos (descendente)
      players.sort((a, b) => b.pontos - a.pontos);

      const tabela = document.getElementById("ranking-table");
      tabela.innerHTML = "";

      players.forEach((p, index) => {
        tabela.innerHTML += `
          <tr>
            <td>${index + 1}</td>
            <td>${p.nome}</td>
            <td>${p.pontos}</td>
          </tr>
        `;
      });
    });
}

// ⭐ INICIALIZAR
window.onload = () => {
  loadRanking();
};

</script>

</body>
</html>
