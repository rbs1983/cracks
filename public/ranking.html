<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Ranking</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #fafafa;
    }

    h1 {
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    table, th, td {
      border: 1px solid #ddd;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }

    button {
      padding: 8px 15px;
      cursor: pointer;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h1>Classificação</h1>

  <button onclick="window.location.href='dashboard.html'">
    Voltar ao Dashboard
  </button>

  <table>
    <thead>
      <tr>
        <th>Posição</th>
        <th>Jogador</th>
        <th>Pontos</th>
      </tr>
    </thead>
    <tbody id="tabela-ranking"></tbody>
  </table>

<script>
function loadRanking() {
  fetch("/ranking")
    .then(r => r.json())
    .then(players => {
      const tabela = document.getElementById("tabela-ranking");
      tabela.innerHTML = "";

      players.forEach((p, idx) => {
        tabela.innerHTML += `
          <tr>
            <td>${idx + 1}</td>
            <td>${p.nome}</td>
            <td>${p.pontos}</td>
          </tr>
        `;
      });
    });
}

window.onload = () => {
  loadRanking();
};
</script>

</body>
</html>
