<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Classificação - Craks da Bola</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="content">

  <h1>Classificação Geral</h1>

  <button onclick="recalcularTudo()" style="margin-bottom:20px; padding:10px 20px; background:#007bff; color:white; border:none; cursor:pointer;">
    Recalcular Tudo
  </button>

  <table>
    <thead>
      <tr>
        <th>Jogador</th>
        <th>Pontos</th>
      </tr>
    </thead>
    <tbody id="ranking-body"></tbody>
  </table>

</div>

<script>
function loadRanking() {
  fetch("/players")
    .then(r => r.json())
    .then(players => {
      const body = document.getElementById("ranking-body");
      body.innerHTML = "";

      players
        .sort((a, b) => b.pontos - a.pontos)
        .forEach(p => {
          body.innerHTML += `
            <tr>
              <td>${p.nome}</td>
              <td>${p.pontos}</td>
            </tr>
          `;
        });
    });
}

function recalcularTudo() {
  fetch("/recalculate-all", { method: "POST" })
    .then(() => loadRanking());
}

window.onload = loadRanking;
</script>

</body>
</html>
