<!DOCTYPE html>
<html>
<head>
  <title>Bolão — Página Inicial</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    a { margin-right: 20px; font-size: 18px; }
    h1 { margin-top: 40px; }
    ul { padding-left: 20px; }
  </style>
</head>
<body>

<h1>Bolão — Página Inicial</h1>

<!-- MENU -->
<nav>
  <a href="admin.html">Painel Admin</a>
  <a href="prognosticos.html">Prognósticos</a>
  <a href="pontos.html">Pontos por Jogo</a>
  <a href="ranking.html">Ranking Geral</a>
</nav>

<h1>Jogos</h1>
<ul id="listaJogos"></ul>

<h1>Ranking</h1>
<ul id="listaRanking"></ul>

<script>
function loadMatches() {
  fetch("/matches")
    .then(res => res.json())
    .then(data => {
      const lista = document.getElementById("listaJogos");
      lista.innerHTML = "";

      data.forEach(m => {
        const texto = m.equipa_casa + " vs " + m.equipa_fora;
        const li = document.createElement("li");

        if (m.golos_casa === null) {
          li.textContent = texto + " ⏳";
        } else {
          li.textContent = texto + " ✅ " + m.golos_casa + "-" + m.golos_fora;
        }

        lista.appendChild(li);
      });
    });
}

function loadRanking() {
  fetch("/ranking")
    .then(res => res.json())
    .then(data => {
      const lista = document.getElementById("listaRanking");
      lista.innerHTML = "";

      data.forEach(p => {
        const li = document.createElement("li");
        li.textContent = p.nome + " — " + p.pontos + " pts";
        lista.appendChild(li);
      });
    });
}

loadMatches();
loadRanking();
</script>

</body>
</html>
