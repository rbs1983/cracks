<!DOCTYPE html>
<html>
<head>
  <title>Ranking</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 40px;
    }

    li {
      font-size: 20px;
      margin: 8px 0;
    }
  </style>
</head>
<body>

  <h1>🏆 Ranking</h1>

  <ul id="ranking"></ul>

  <script>
    fetch("/ranking")
      .then(res => res.json())
      .then(data => {
        const ul = document.getElementById("ranking");
        ul.innerHTML = "";

        data.forEach((p, index) => {
          const li = document.createElement("li");

          li.textContent =
            (index + 1) + "º - " +
            p.nome + " - " +
            p.pontos + " pts";

          ul.appendChild(li);
        });
      })
      .catch(err => {
        console.error(err);
      });
  </script>

</body>
</html>
