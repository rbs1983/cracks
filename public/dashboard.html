<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Liga Portuguesa - Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      background: #0f172a;
      color: #e5e7eb;
    }

    .sidebar {
      width: 240px;
      background: #020617;
      padding: 20px;
      box-sizing: border-box;
      border-right: 1px solid #1f2937;
    }

    .sidebar-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 20px;
      color: #f97316;
    }

    .menu {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .menu-item {
      margin-bottom: 10px;
    }

    .menu-link {
      display: block;
      padding: 10px;
      border-radius: 6px;
      text-decoration: none;
      color: #e5e7eb;
      background: transparent;
      cursor: pointer;
    }

    .menu-link:hover {
      background: #1f2937;
    }

    .menu-link.active {
      background: #2563eb;
      color: white;
    }

    .content {
      flex: 1;
      padding: 24px;
      box-sizing: border-box;
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <div class="sidebar-title">Liga Portuguesa</div>

    <ul class="menu">
      <li class="menu-item">
        <a class="menu-link active" data-section="classificacao">Classificação</a>
      </li>
      <li class="menu-item">
        <a class="menu-link" data-section="jogos">Jogos</a>
      </li>
      <li class="menu-item">
        <a class="menu-link" data-section="palpites">Palpites</a>
      </li>
    </ul>
  </aside>

  <main class="content" id="content">
    <h1>Classificação</h1>
    <p>Aqui vais mostrar a tabela da Liga Portuguesa.</p>
  </main>

  <script>
    const links = document.querySelectorAll(".menu-link");
    const content = document.getElementById("content");

    const sections = {
      classificacao: {
        title: "Classificação",
        text: "Aqui vais mostrar a tabela da Liga Portuguesa."
      },
      jogos: {
        title: "Jogos",
        text: "Lista de jogos, resultados e próximos encontros."
      },
      palpites: {
        title: "Palpites",
        text: "Zona de palpites, previsões e estatísticas."
      }
    };

    links.forEach(link => {
      link.addEventListener("click", () => {
        links.forEach(l => l.classList.remove("active"));
        link.classList.add("active");

        const section = sections[link.dataset.section];
        content.innerHTML = `<h1>${section.title}</h1><p>${section.text}</p>`;
      });
    });
  </script>

</body>
</html>
