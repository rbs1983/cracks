<script>
  const links = document.querySelectorAll(".menu-link");
  const content = document.getElementById("content");

  // Endpoints da tua API no Railway
const API = {
  classificacao: "https://teu-projeto.railway.app/classificacao",
  jogos: "https://teu-projeto.railway.app/jogos",
  palpites: "https://teu-projeto.railway.app/palpites"
};


  // Renderização genérica
  function renderSection(title, html) {
    content.innerHTML = `<h1>${title}</h1>${html}`;
  }

  // Função para buscar dados da API
  async function loadSection(section) {
    const endpoint = API[section];

    try {
      const res = await fetch(endpoint);
      const data = await res.json();

      switch (section) {
        case "classificacao":
          renderSection("Classificação", buildClassificacaoTable(data));
          break;

        case "jogos":
          renderSection("Jogos", buildJogosList(data));
          break;

        case "palpites":
          renderSection("Palpites", buildPalpitesTable(data));
          break;
      }

    } catch (err) {
      renderSection("Erro", `<p>Não foi possível carregar os dados.</p>`);
      console.error(err);
    }
  }

  // Construção das tabelas
  function buildClassificacaoTable(data) {
    let rows = data.map(team => `
      <tr>
        <td>${team.pos}</td>
        <td>${team.nome}</td>
        <td>${team.pontos}</td>
      </tr>
    `).join("");

    return `
      <table border="1" cellpadding="6">
        <tr><th>Pos</th><th>Equipa</th><th>Pontos</th></tr>
        ${rows}
      </table>
    `;
  }

  function buildJogosList(data) {
    return data.map(j => `
      <p>${j.casa} ${j.golosCasa} - ${j.golosFora} ${j.fora}</p>
    `).join("");
  }

  function buildPalpitesTable(data) {
    let rows = data.map(p => `
      <tr>
        <td>${p.jogo}</td>
        <td>${p.user}</td>
        <td>${p.palpite}</td>
        <td>${p.pontos}</td>
      </tr>
    `).join("");

    return `
      <table border="1" cellpadding="6">
        <tr><th>Jogo</th><th>Jogador</th><th>Palpite</th><th>Pontos</th></tr>
        ${rows}
      </table>
    `;
  }

  // Eventos do menu
  links.forEach(link => {
    link.addEventListener("click", () => {
      links.forEach(l => l.classList.remove("active"));
      link.classList.add("active");

      loadSection(link.dataset.section);
    });
  });

  // Carregar a primeira secção ao abrir
  loadSection("classificacao");
</script>
