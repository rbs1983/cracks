<!DOCTYPE html>
<html>
<head>
  <title>Prognósticos</title>
  <style>
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
    th { background: #eee; }
  </style>
</head>
<body>

<h1>Prognósticos</h1>
<table id="tabela"></table>

<script>
async function loadData() {
  const players = await fetch("/players").then(r => r.json());
  const matches = await fetch("/matches").then(r => r.json());
  const predictions = await fetch("/all-predictions").then(r => r.json());

  const tabela = document.getElementById("tabela");

  // Cabeçalho
  let header = "<tr><th>Jogador</th>";
  matches.forEach(m => {
    header += `<th>${m.equipa_casa} vs ${m.equipa_fora}</th>`;
  });
  header += "</tr>";
  tabela.innerHTML = header;

  // Linhas
  players.forEach(p => {
    let row = `<tr><td>${p.nome}</td>`;

    matches.forEach(m => {
      const pred = predictions.find(x => x.player_id === p.id && x.match_id === m.id);
      if (!pred) row += "<td>-</td>";
      else row += `<td>${pred.palpite_casa}-${pred.palpite_fora}</td>`;
    });

    row += "</tr>";
    tabela.innerHTML += row;
  });
}

loadData();
</script>

</body>
</html>
