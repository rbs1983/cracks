<!DOCTYPE html>
<html>
<head>
  <title>Painel Admin</title>
</head>
<body>

<h1>Painel Admin</h1>

<h2>Jogadores</h2>
<ul id="listaJogadores"></ul>

<h2>Criar jogo</h2>
<input id="casa" placeholder="Casa">
<input id="fora" placeholder="Fora">
<button onclick="addMatch()">Criar</button>

<h2>Jogos</h2>
<ul id="listaJogos"></ul>

<h2>Palpite</h2>
<select id="playerSelect"></select>
<select id="matchSelect"></select>

<input id="palpiteCasa" placeholder="Casa">
<input id="palpiteFora" placeholder="Fora">

<button onclick="addPrediction()">Guardar palpite</button>

<h2>Resultado</h2>
<select id="resultMatchSelect"></select>

<input id="resCasa" placeholder="Casa">
<input id="resFora" placeholder="Fora">

<button onclick="setResult()">Inserir resultado</button>

<script>

// ✅ carregar jogadores
function loadPlayers() {
  fetch("/players")
    .then(res => res.json())
    .then(data => {
      const select = document.getElementById("playerSelect");
      const lista = document.getElementById("listaJogadores");

      select.innerHTML = "";
      lista.innerHTML = "";

      data.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = p.nome;
        select.appendChild(opt);

        const li = document.createElement("li");
        li.textContent = p.nome;
        lista.appendChild(li);
      });
    })
    .catch(err => console.error("Erro players:", err));
}

// ✅ carregar jogos
function loadMatches() {
  fetch("/matches")
    .then(res => res.json())
    .then(data => {
      const mSel = document.getElementById("matchSelect");
      const rSel = document.getElementById("resultMatchSelect");
      const lista = document.getElementById("listaJogos");

      mSel.innerHTML = "";
      rSel.innerHTML = "";
      lista.innerHTML = "";

      data.forEach(m => {

        const texto = m.casa + " vs " + m.fora;

        // dropdown palpite
        let o1 = document.createElement("option");
        o1.value = m.id;
        o1.textContent = texto;
        mSel.appendChild(o1);

        // dropdown resultado
        let o2 = document.createElement("option");
        o2.value = m.id;
        o2.textContent = texto;
        rSel.appendChild(o2);

        // lista visual
        let li = document.createElement("li");

        if (m.golos_casa === null) {
          li.textContent = texto + " ⏳";
        } else {
          li.textContent =
            texto + " ✅ " + m.golos_casa + "-" + m.golos_fora;
        }

        lista.appendChild(li);
      });
    })
    .catch(err => console.error("Erro matches:", err));
}

// ✅ criar jogo
function addMatch() {
  const casa = document.getElementById("casa").value;
  const fora = document.getElementById("fora").value;

  if (!casa || !fora) {
    alert("Preenche as equipas!");
    return;
  }

  fetch("/add-match", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ casa, fora })
  })
  .then(res => res.text())
  .then(() => {
    alert("Jogo criado ✅");
    loadMatches();
  })
  .catch(err => console.error("Erro criar jogo:", err));
}

// ✅ inserir palpite
function addPrediction() {
  const player_id = document.getElementById("playerSelect").value;
  const match_id = document.getElementById("matchSelect").value;
  const casa = document.getElementById("palpiteCasa").value;
  const fora = document.getElementById("palpiteFora").value;

  if (!casa || !fora) {
    alert("Preenche o palpite!");
    return;
  }

  fetch("/add-prediction", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      player_id: parseInt(player_id),
      match_id: parseInt(match_id),
      palpite_casa: parseInt(casa),
      palpite_fora: parseInt(fora)
    })
  })
  .then(() => alert("Palpite guardado ✅"))
  .catch(err => console.error("Erro palpite:", err));
}

// ✅ inserir resultado
function setResult() {
  const id = document.getElementById("resultMatchSelect").value;
  const casa = document.getElementById("resCasa").value;
  const fora = document.getElementById("resFora").value;

  if (!casa || !fora) {
    alert("Preenche resultado!");
    return;
  }

  fetch("/result/" + id, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      casa: parseInt(casa),
      fora: parseInt(fora)
    })
  })
  .then(() => {
    alert("Resultado inserido ✅");
    loadMatches();
  })
  .catch(err => console.error("Erro resultado:", err));
}

// ✅ carregar ao abrir
loadPlayers();
loadMatches();

</script>

</body>
</html>
