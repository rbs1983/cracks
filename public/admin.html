<!DOCTYPE html>
<html>
<head>
  <title>Painel Admin</title>
</head>
<body>

  <h1>Painel Admin</h1>

  <!-- JOGADORES -->
  <h2>Adicionar jogador</h2>
  <input id="nome" placeholder="Nome">
  <button onclick="addPlayer()">Adicionar jogador</button>

  <!-- JOGOS -->
  <h2>Criar jogo</h2>
  <input id="casa" placeholder="Equipa casa">
  <input id="fora" placeholder="Equipa fora">
  <button onclick="addMatch()">Adicionar jogo</button>

  <script>

    // DEBUG (vai aparecer no console)
    console.log("Admin carregado ✅");

    function addPlayer() {
      const nome = document.getElementById("nome").value;

      if (!nome) {
        alert("Escreve um nome!");
        return;
      }

      fetch("/add-player", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nome })
      })
      .then(res => res.text())
      .then(() => alert("Jogador adicionado ✅"))
      .catch(err => {
        console.error(err);
        alert("Erro ❌");
      });
    }

    function addMatch() {
      const casa = document.getElementById("casa").value;
      const fora = document.getElementById("fora").value;

      console.log("Clique no botão ✅"); // DEBUG

      if (!casa || !fora) {
        alert("Preenche as equipas!");
        return;
      }

      fetch("/add-match", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ casa, fora })
      })
      .then(res => res.text())
      .then(() => alert("Jogo criado ✅"))
      .catch(err => {
        console.error(err);
        alert("Erro ao criar jogo ❌");
      });
    }

  </script>

</body>
</html>
