<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
</head>
<body>

  <h1>Painel Admin</h1>

  <h2>Jogador</h2>
  <input id="nome" placeholder="Nome">
  <button onclick="addPlayer()">Adicionar jogador</button>

  <h2>Jogo</h2>
  <input id="casa" placeholder="Equipa Casa">
  <input id="fora" placeholder="Equipa Fora">
  <button onclick="addMatch()">Adicionar jogo</button>

  <script>
    function addPlayer() {
      fetch("/add-player", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ nome: nome.value })
      }).then(() => alert("Jogador adicionado"));
    }

    function addMatch() {
      fetch("/add-match", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          casa: casa.value,
          fora: fora.value
        })
      }).then(() => alert("Jogo adicionado"));
    }
  </script>

</body>
</html>
<h2>Criar jogo</h2>
<input id="casa" placeholder="Equipa casa">
<input id="fora" placeholder="Equipa fora">
<button onclick="addMatch()">Adicionar jogo</button>

<script>
function addMatch() {
  fetch("/add-match", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      casa: casa.value,
      fora: fora.value
    })
  }).then(() => alert("Jogo criado!"));
}
</script>
