<!DOCTYPE html>
<html>
<head>
  <title>Painel Admin</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 32px;
    }

    h2 {
      margin-top: 30px;
    }

    input, select {
      margin: 5px;
      padding: 8px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    ul {
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>Painel Admin ⚙️</h1>

  <!-- LISTA DE JOGADORES -->
  <h2>Jogadores</h2>
  <ul id="listaJogadores"></ul>

  <!-- CRIAR JOGO -->
  <h2>Criar jogo</h2>
  <input id="casa" placeholder="Equipa casa">
  <input id="fora" placeholder="Equipa fora">
  <button onclick="addMatch()">Adicionar jogo</button>

  <!-- INSERIR PALPITE -->
  <h2>Inserir palpite</h2>

  <select id="playerSelect"></select>
  <select id="matchSelect"></select>

  <input id="palpiteCasa" placeholder="Golos casa">
  <input id="palpiteFora" placeholder="Golos fora">

  <button onclick="addPrediction()">Adicionar palpite</button>

  <!-- INSERIR RESULTADO -->
  <h2>Inserir resultado</h2>

  <select id="resultMatchSelect"></select>

  <input id="resCasa" placeholder="Golos casa">
  <input id="resFora" placeholder="Golos fora">

  <button onclick="setResult()">Inserir resultado</button>

  <script>

    // ✅ carregar jogadores (dropdown + lista)
    function loadPlayers() {
      fetch("/players")
        .then(res => res.json())
        .then(data => {
          const select = document.getElementById("playerSelect");
          const lista = document.getElementById("listaJogadores");

          select.innerHTML = "";
          lista.innerHTML = "";

          data.forEach(p => {
            // dropdown
            const option = document.createElement("option");
            option.value = p.id;
            option.textContent = p.nome;
            select.appendChild(option);

            // lista visual
            const li = document.createElement("li");
            li.textContent = p.nome;
            lista.appendChild(li);
          });
        });
    }

    // ✅ carregar jogos
    function loadMatches() {
      fetch("/matches")
        .then(res => res.json())
        .then(data => {

          const matchSelect = document.getElementById("matchSelect");
          const resultSelect = document.getElementById("resultMatchSelect");

          matchSelect.innerHTML = "";
          resultSelect.innerHTML = "";

          data.forEach(m => {
            const text = m.casa + " vs " + m.fora;

            const option1 = document.createElement("option");
            option1.value = m.id;
            option1.textContent = text;
            matchSelect.appendChild(option1);

            const option2 = document.createElement("option");
            option2.value = m.id;
            option2.textContent = text;
            resultSelect.appendChild(option2);
          });
        });
    }

    // ✅ criar jogo
    function addMatch() {
      const casa = document.getElementById("casa").value;
      const fora = document.getElementById("fora").value;

      if (!casa || !fora) {
        alert("Preenche as equipas!");
        return;
      }

      fetch("/add-match", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ casa, fora })
      })
      .then(() => {
        alert("Jogo criado ✅");
        loadMatches();
      });
    }

    // ✅ adicionar palpite
    function addPrediction() {
      fetch("/add-prediction", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          player_id: parseInt(playerSelect.value),
          match_id: parseInt(matchSelect.value),
          palpite_casa: parseInt(palpiteCasa.value),
          palpite_fora: parseInt(palpiteFora.value)
        })
      })
      .then(() => alert("Palpite adicionado ✅"));
    }

    // ✅ inserir resultado
    function setResult() {
      fetch("/result/" + resultMatchSelect.value, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          casa: parseInt(resCasa.value),
          fora: parseInt(resFora.value)
        })
      })
      .then(() => alert("Resultado inserido ✅"));
    }

    // ✅ carregar dados ao iniciar
    loadPlayers();
    loadMatches();

  </script>

</body>
</html>
``
