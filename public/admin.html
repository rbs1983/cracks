<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin - Liga Portuguesa</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #1e293b;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      border-right: 2px solid #334155;
      position: fixed;
    }

    .sidebar h2 {
      color: #f97316;
      margin-bottom: 20px;
    }

    .sidebar button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      text-align: left;
    }

    .sidebar button:hover {
      background: #1d4ed8;
    }

    .content {
      margin-left: 240px;
      padding: 20px;
      width: calc(100% - 240px);
    }

    .section {
      background: #1e293b;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 25px;
      border: 1px solid #334155;
      display: none;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 6px;
      border: none;
      background: #334155;
      color: white;
    }

    button.action {
      margin-top: 15px;
      padding: 10px 15px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }

    button.action:hover {
      background: #1d4ed8;
    }

    .deleteBtn {
      background: #f87171;
      color: #1e293b;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }

    .deleteBtn:hover {
      background: #ef4444;
      color: white;
    }

    .msg {
      margin-top: 10px;
      padding: 10px;
      background: #22c55e;
      color: black;
      border-radius: 6px;
      display: none;
    }

    /* RESULTADOS */

    .resultCard {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #334155;
      margin-bottom: 20px;
    }

    .resultHeader {
      font-size: 1.1rem;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .resultTeams {
      margin-bottom: 15px;
    }

    .resultInputs {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
    }

    .resultInputs div {
      display: flex;
      flex-direction: column;
    }

    .resultInputs input {
      width: 80px;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #475569;
      color: white;
      font-size: 1rem;
      text-align: center;
    }

    .resultButtons {
      margin-top: 10px;
    }

    /* PROGNÓSTICOS */

    #cardsJogos {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .cardJogo {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #334155;
      min-width: 300px;
    }

    .resultadoReal {
      background: #475569;
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-weight: bold;
      text-align: center;
    }

    .tabelaPrognosticos {
      width: 100%;
      border-collapse: collapse;
    }

    .tabelaPrognosticos td {
      padding: 6px;
    }

    .tabelaPrognosticos input {
      width: 50px;
      padding: 5px;
      background: #334155;
      border: none;
      border-radius: 6px;
      color: white;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2>Admin</h2>
    <button onclick="mostrarSecao('criarJogo')">Criar Jogos</button>
    <button onclick="mostrarSecao('verJogos')">Resultados dos Jogos</button>
    <button onclick="mostrarSecao('prognosticos')">Prognósticos</button>
  </div>

  <div class="content">

    <!-- ============================
         CRIAR JOGO
    ============================= -->
    <div id="criarJogo" class="section">
      <h2>Criar Jogo</h2>

      <label>Jornada</label>
      <select id="jornada"></select>

      <label>Equipa da Casa</label>
      <input id="casa" type="text">

      <label>Equipa de Fora</label>
      <input id="fora" type="text">

      <button class="action" onclick="addJogo()">Criar Jogo</button>
      <div id="msgJogo" class="msg"></div>

      <h3>Jogos Criados</h3>
      <div id="listaCriarJogos"></div>
    </div>

    <!-- ============================
         RESULTADOS DOS JOGOS
    ============================= -->
    <div id="verJogos" class="section">
      <h2>Resultados dos Jogos</h2>

      <h3>Inserir Resultado</h3>
      <div id="listaResultadosInserir"></div>

      <h3>Jogos Realizados</h3>
      <div id="listaResultadosGuardados"></div>
    </div>

    <!-- ============================
         PROGNÓSTICOS
    ============================= -->
    <div id="prognosticos" class="section">
      <h2>Prognósticos</h2>

      <label>Selecionar Jornada</label>
      <select id="selectJornadaPrognosticos" onchange="carregarPrognosticosJornada()"></select>

      <div style="display: flex; gap: 20px; margin-top: 20px;">
        
        <!-- COLUNA ESQUERDA: JOGADORES FIXOS -->
        <div style="width: 220px;">
          <h3>Jogadores</h3>
          <ul id="listaJogadoresFixos"></ul>
        </div>

        <!-- COLUNA DIREITA: 4 CARDS DOS JOGOS -->
        <div style="flex: 1; overflow-x: auto;">
          <div id="cardsJogos"></div>
        </div>

      </div>
    </div>

  </div>

  <script>

    function mostrarSecao(id) {
      document.querySelectorAll('.section').forEach(sec => sec.style.display = 'none');
      document.getElementById(id).style.display = 'block';

      if (id === "criarJogo") carregarJogosCriados();
      if (id === "verJogos") carregarResultados();
      if (id === "prognosticos") carregarPrognosticosJornada();
    }

    /* ============================
         CRIAR JOGO
    ============================= */

    const jornadaSelect = document.getElementById("jornada");
    for (let i = 1; i <= 34; i++) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = "Jornada " + i;
      jornadaSelect.appendChild(opt);
    }

    function showMsg(id, texto) {
      const div = document.getElementById(id);
      div.innerText = texto;
      div.style.display = "block";
      setTimeout(() => div.style.display = "none", 3000);
    }

    async function addJogo() {
      const body = {
        jornada: Number(document.getElementById("jornada").value),
        casa: document.getElementById("casa").value,
        fora: document.getElementById("fora").value
      };

      await fetch("/add-jogo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      showMsg("msgJogo", "Jogo criado com sucesso!");
      carregarJogosCriados();
    }

    async function carregarJogosCriados() {
      const listaDiv = document.getElementById("listaCriarJogos");

      const res = await fetch("/jogos");
      const jogos = await res.json();

      let html = "<ul>";
      for (let i = jogos.length - 1; i >= 0; i--) {
        const j = jogos[i];
        html += `
          <li>
            Jornada ${j.jornada}: ${j.casa} vs ${j.fora}
            <button class="deleteBtn" onclick="apagarJogo(${i})">Apagar</button>
          </li>`;
      }
      html += "</ul>";

      listaDiv.innerHTML = html;
    }

    async function apagarJogo(index) {
      const res = await fetch("/delete-jogo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ index })
      });

      const data = await res.json();
      if (data.success) {
        carregarJogosCriados();
      } else {
        alert("Erro ao apagar jogo.");
      }
    }

    /* ============================
         RESULTADOS DOS JOGOS
    ============================= */

    async function carregarResultados() {
      const inserirDiv = document.getElementById("listaResultadosInserir");
      const guardadosDiv = document.getElementById("listaResultadosGuardados");

      const res = await fetch("/jogos");
      const jogos = await res.json();

      const ordenados = jogos.slice().sort((a, b) => b.jornada - a.jornada);

      let htmlInserir = "";
      let htmlGuardados = "";

      ordenados.forEach((j, index) => {
        const temResultado = j.golosCasa !== undefined && j.golosFora !== undefined;

        if (!temResultado) {
          htmlInserir += `
            <div class="resultCard">
              <div class="resultHeader">Jornada ${j.jornada}</div>

              <div class="resultTeams">
                <strong>${j.casa}</strong> vs <strong>${j.fora}</strong>
              </div>

              <div class="resultInputs">
                <div>
                  <label>Golos ${j.casa}</label>
                  <input id="golosCasa_${index}" type="number" min="0">
                </div>

                <div>
                  <label>Golos ${j.fora}</label>
                  <input id="golosFora_${index}" type="number" min="0">
                </div>
              </div>

              <div class="resultButtons">
                <button class="action" onclick="guardarResultado(${index})">Guardar Resultado</button>
              </div>
            </div>
          `;
        } else {
          htmlGuardados += `
            <div class="resultCard">
              <div class="resultHeader">Jornada ${j.jornada}</div>

              <div class="resultTeams">
                <strong>${j.casa}</strong> ${j.golosCasa} - ${j.golosFora} <strong>${j.fora}</strong>
              </div>

              <div class="resultButtons">
                <button class="action" onclick="editarResultado(${index})">Editar</button>
              </div>
            </div>
          `;
        }
      });

      inserirDiv.innerHTML = htmlInserir;
      guardadosDiv.innerHTML = htmlGuardados;

      window.jogosOrdenados = ordenados;
    }

    async function guardarResultado(index) {
      const jogo = window.jogosOrdenados[index];

      const golosCasa = Number(document.getElementById(`golosCasa_${index}`).value);
      const golosFora = Number(document.getElementById(`golosFora_${index}`).value);

      const body = {
        jornada: jogo.jornada,
        casa: jogo.casa,
        fora: jogo.fora,
        golosCasa,
        golosFora
      };

      const res = await fetch("/update-resultado", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (data.success) {
        carregarResultados();
      } else {
        alert("Erro ao guardar resultado.");
      }
    }

    function editarResultado(index) {
      const jogo = window.jogosOrdenados[index];

      const guardadosDiv = document.getElementById("listaResultadosGuardados");

      const editarDiv = document.createElement("div");
      editarDiv.className = "resultCard";
      editarDiv.style.border = "2px solid #2563eb";

      editarDiv.innerHTML = `
        <div class="resultHeader">Editar Resultado — Jornada ${jogo.jornada}</div>

        <div class="resultTeams">
          <strong>${jogo.casa}</strong> vs <strong>${jogo.fora}</strong>
        </div>

        <div class="resultInputs">
          <div>
            <label>Golos ${jogo.casa}</label>
            <input id="editCasa" type="number" min="0" value="${jogo.golosCasa}">
          </div>

          <div>
            <label>Golos ${jogo.fora}</label>
            <input id="editFora" type="number" min="0" value="${jogo.golosFora}">
          </div>
        </div>

        <div class="resultButtons">
          <button class="action" onclick="guardarEdicao(${index})">Guardar Alteração</button>
        </div>
      `;

      guardadosDiv.prepend(editarDiv);
    }

    async function guardarEdicao(index) {
      const jogo = window.jogosOrdenados[index];

      const golosCasa = Number(document.getElementById("editCasa").value);
      const golosFora = Number(document.getElementById("editFora").value);

      const body = {
        jornada: jogo.jornada,
        casa: jogo.casa,
        fora: jogo.fora,
        golosCasa,
        golosFora
      };

      const res = await fetch("/update-resultado", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (data.success) {
        carregarResultados();
      } else {
        alert("Erro ao editar resultado.");
      }
    }

    /* ============================
         PROGNÓSTICOS
    ============================= */

    const jogadoresFixos = [
      "André David",
      "António Silva",
      "Bruno Marques"
    ];

    const selectJornadaPrognosticos = document.getElementById("selectJornadaPrognosticos");
    for (let i = 1; i <= 34; i++) {
      const opt2 = document.createElement("option");
      opt2.value = i;
      opt2.textContent = "Jornada " + i;
      selectJornadaPrognosticos.appendChild(opt2);
    }

    function mostrarJogadoresFixos() {
      const div = document.getElementById("listaJogadoresFixos");
      div.innerHTML = jogadoresFixos.map(j => `<li>${j}</li>`).join("");
    }

    async function carregarPrognosticosJornada() {
      mostrarJogadoresFixos();

      const jornada = Number(selectJornadaPrognosticos.value);
      const res = await fetch("/jogos");
      const jogos = await res.json();

      const jogosDaJornada = jogos.filter(j => j.jornada === jornada);

      const cardsDiv = document.getElementById("cardsJogos");
      cardsDiv.innerHTML = "";

      jogosDaJornada.forEach((jogo, jogoIndex) => {

        let resultadoReal = "Sem resultado";
        if (jogo.golosCasa !== undefined && jogo.golosFora !== undefined) {
          resultadoReal = `${jogo.golosCasa} - ${jogo.golosFora}`;
        }

        let tabela = `
          <table class="tabelaPrognosticos">
            <tr><th>Prognóstico</th></tr>
        `;

        jogadoresFixos.forEach(jogador => {
          tabela += `
            <tr>
              <td>
                <input type="number" min="0" id="progCasa_${jogoIndex}_${jogador}"
                  oninput="guardarPrognostico('${jogador}', ${jogoIndex})">
                -
                <input type="number" min="0" id="progFora_${jogoIndex}_${jogador}"
                  oninput="guardarPrognostico('${jogador}', ${jogoIndex})">
              </td>
            </tr>
          `;
        });

        tabela += "</table>";

        const card = `
