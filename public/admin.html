<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Admin - Craks da Bola</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #111; color: #fff; }
    h2 { margin-top: 30px; color: #4af; }
    input, select { padding: 6px; margin: 4px; }
    button { padding: 6px 12px; margin: 4px; cursor: pointer; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #444; padding: 6px; text-align: center; }
    th { background: #222; }
  </style>
</head>
<body>

<h1>Administração</h1>

<!-- ========================= -->
<!-- ADICIONAR JOGADOR -->
<!-- ========================= -->
<h2>Adicionar Jogador</h2>
<input id="nomeJogador" placeholder="Nome do jogador">
<button onclick="addPlayer()">Adicionar</button>

<!-- ========================= -->
<!-- ADICIONAR JOGO -->
<!-- ========================= -->
<h2>Adicionar Jogo</h2>
<input id="equipaCasa" placeholder="Equipa da casa">
<input id="equipaFora" placeholder="Equipa de fora">
<input id="jornada" type="number" placeholder="Jornada">
<button onclick="addMatch()">Adicionar Jogo</button>

<!-- ========================= -->
<!-- LISTA DE JOGOS -->
<!-- ========================= -->
<h2>Jogos</h2>
<table id="tabelaJogos"></table>

<!-- ========================= -->
<!-- REPROCESSAMENTO -->
<!-- ========================= -->
<h2>Reprocessamento</h2>
<button onclick="recalculateAll()">Reprocessar Tudo</button>

<script>
async function addPlayer() {
  const nome = document.getElementById("nomeJogador").value;
  if (!nome) return alert("Escreve um nome!");

  await fetch("/add-player", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nome })
  });

  alert("Jogador adicionado!");
  loadJogos();
}

async function addMatch() {
  const equipa_casa = document.getElementById("equipaCasa").value;
  const equipa_fora = document.getElementById("equipaFora").value;
  const jornada = document.getElementById("jornada").value;

  if (!equipa_casa || !equipa_fora || !jornada)
    return alert("Preenche todos os campos!");

  await fetch("/add-match", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ equipa_casa, equipa_fora, jornada })
  });

  alert("Jogo adicionado!");
  loadJogos();
}

async function inserirResultado(id) {
  const casa = prompt("Golos da equipa da casa:");
  const fora = prompt("Golos da equipa de fora:");

  if (casa === null || fora === null) return;

  await fetch(`/result/${id}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ casa, fora })
  });

  alert("Resultado inserido!");
  loadJogos();
}

async function reprocessar(id) {
  await fetch(`/reprocess/${id}`, { method: "POST" });
  alert("Jogo reprocessado!");
}

async function recalculateAll() {
  await fetch("/recalculate-all", { method: "POST" });
  alert("Reprocessamento total concluído!");
}

async function loadJogos() {
  const jogos = await fetch("/matches").then(r => r.json());
  const tabela = document.getElementById("tabelaJogos");

  let html = `
    <tr>
      <th>ID</th>
      <th>Casa</th>
      <th>Fora</th>
      <th>Jornada</th>
      <th>Resultado</th>
      <th>Ações</th>
    </tr>
  `;

  jogos.forEach(j => {
    html += `
      <tr>
        <td>${j.id}</td>
        <td>${j.equipa_casa}</td>
        <td>${j.equipa_fora}</td>
        <td>${j.jornada}</td>
        <td>${j.golos_casa == null ? "-" : j.golos_casa + " - " + j.golos_fora}</td>
        <td>
          <button onclick="inserirResultado(${j.id})">Inserir Resultado</button>
          <button onclick="reprocessar(${j.id})">Reprocessar</button>
        </td>
      </tr>
    `;
  });

  tabela.innerHTML = html;
}

loadJogos();
</script>

</body>
</html>
