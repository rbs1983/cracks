<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin - Liga Portuguesa</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
    }

    /* MENU LATERAL */
    .sidebar {
      width: 220px;
      background: #1e293b;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      border-right: 2px solid #334155;
      position: fixed;
    }

    .sidebar h2 {
      color: #f97316;
      margin-bottom: 20px;
    }

    .sidebar button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      text-align: left;
    }

    .sidebar button:hover {
      background: #1d4ed8;
    }

    /* CONTEÚDO PRINCIPAL */
    .content {
      margin-left: 240px;
      padding: 20px;
      width: 100%;
    }

    .section {
      background: #1e293b;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 25px;
      border: 1px solid #334155;
      display: none; /* escondido por padrão */
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 6px;
      border: none;
      background: #334155;
      color: white;
    }

    button.action {
      margin-top: 15px;
      padding: 10px 15px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }

    button.action:hover {
      background: #1d4ed8;
    }

    .msg {
      margin-top: 10px;
      padding: 10px;
      background: #22c55e;
      color: black;
      border-radius: 6px;
      display: none;
    }
  </style>
</head>

<body>

  <!-- MENU LATERAL -->
  <div class="sidebar">
    <h2>Admin</h2>
    <button onclick="mostrarSecao('criarJogo')">Criar Jogos</button>
    <button onclick="mostrarSecao('verJogos')">Ver Jogos por Jornada</button>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">

    <!-- ============================
         CRIAR JOGO
    ============================= -->
    <div id="criarJogo" class="section">
      <h2>Criar Jogo</h2>

      <label>Jornada</label>
      <select id="jornada"></select>

      <label>Equipa da Casa</label>
      <input id="casa" type="text">

      <label>Equipa de Fora</label>
      <input id="fora" type="text">

      <button class="action" onclick="addJogo()">Criar Jogo</button>
      <div id="msgJogo" class="msg"></div>

      <h3>Jogos Criados</h3>
      <div id="listaCriarJogos"></div>
    </div>

    <!-- ============================
         VER JOGOS POR JORNADA
    ============================= -->
    <div id="verJogos" class="section">
      <h2>Ver Jogos por Jornada</h2>

      <label>Selecionar Jornada</label>
      <select id="verJornada"></select>

      <button class="action" onclick="carregarJogos()">Mostrar Jogos</button>

      <div id="listaJogos" style="margin-top: 15px;"></div>
    </div>

  </div>

  <script>
    // Mostrar secções
    function mostrarSecao(id) {
      document.querySelectorAll('.section').forEach(sec => sec.style.display = 'none');
      document.getElementById(id).style.display = 'block';

      if (id === "criarJogo") carregarJogosCriados();
    }

    // Preencher dropdowns de jornada
    const jornadaSelect = document.getElementById("jornada");
    const verJornadaSelect = document.getElementById("verJornada");

    for (let i = 1; i <= 34; i++) {
      const opt1 = document.createElement("option");
      opt1.value = i;
      opt1.textContent = "Jornada " + i;
      jornadaSelect.appendChild(opt1);

      const opt2 = document.createElement("option");
      opt2.value = i;
      opt2.textContent = "Jornada " + i;
      verJornadaSelect.appendChild(opt2);
    }

    // Mensagens
    function showMsg(id, texto) {
      const div = document.getElementById(id);
      div.innerText = texto;
      div.style.display = "block";
      setTimeout(() => div.style.display = "none", 3000);
    }

    // Criar jogo
    async function addJogo() {
      const body = {
        jornada: Number(document.getElementById("jornada").value),
        casa: document.getElementById("casa").value,
        fora: document.getElementById("fora").value
      };

      const res = await fetch("/add-jogo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await res.json();
      showMsg("msgJogo", "Jogo criado com sucesso!");

      carregarJogosCriados(); // atualizar lista imediatamente
    }

    // Ver jogos por jornada
    async function carregarJogos() {
      const jornadaEscolhida = Number(document.getElementById("verJornada").value);
      const listaDiv = document.getElementById("listaJogos");

      const res = await fetch("/jogos");
      const jogos = await res.json();

      const filtrados = jogos.filter(j => j.jornada === jornadaEscolhida);

      if (filtrados.length === 0) {
        listaDiv.innerHTML = "<p>Nenhum jogo encontrado para esta jornada.</p>";
        return;
      }

      let html = "<ul>";
      filtrados.forEach(j => {
        html += `<li>${j.casa} vs ${j.fora}</li>`;
      });
      html += "</ul>";

      listaDiv.innerHTML = html;
    }

    // Carregar jogos criados (último primeiro)
    async function carregarJogosCriados() {
      const listaDiv = document.getElementById("listaCriarJogos");

      const res = await fetch("/jogos");
      const jogos = await res.json();

      const ordenados = jogos.slice().reverse();

      let html = "<ul>";
      ordenados.forEach(j => {
        html += `<li>Jornada ${j.jornada}: ${j.casa} vs ${j.fora}</li>`;
      });
      html += "</ul>";

      listaDiv.innerHTML = html;
    }

    // Mostrar secção inicial
    mostrarSecao('criarJogo');
  </script>

</body>
</html>
