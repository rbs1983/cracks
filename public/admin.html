<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin - Liga Portuguesa</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #1e293b;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      border-right: 2px solid #334155;
      position: fixed;
    }

    .sidebar h2 {
      color: #f97316;
      margin-bottom: 20px;
    }

    .sidebar button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      text-align: left;
    }

    .sidebar button:hover {
      background: #1d4ed8;
    }

    .content {
      margin-left: 240px;
      padding: 20px;
      width: calc(100% - 240px);
    }

    .section {
      background: #1e293b;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 25px;
      border: 1px solid #334155;
      display: none;
    }

    /* ============================
       PROGNÓSTICOS
    ============================= */

    #cardsJogos {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .cardJogo {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #334155;
      min-width: 300px;
    }

    .resultadoReal {
      background: #475569;
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-weight: bold;
      text-align: center;
    }

    .tabelaPrognosticos {
      width: 100%;
      border-collapse: collapse;
    }

    .tabelaPrognosticos td {
      padding: 6px;
    }

    .tabelaPrognosticos input {
      width: 50px;
      padding: 5px;
      background: #334155;
      border: none;
      border-radius: 6px;
      color: white;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2>Admin</h2>
    <button onclick="mostrarSecao('criarJogo')">Criar Jogos</button>
    <button onclick="mostrarSecao('verJogos')">Resultados dos Jogos</button>
    <button onclick="mostrarSecao('prognosticos')">Prognósticos</button>
  </div>

  <div class="content">

    <!-- ============================
         PROGNÓSTICOS
    ============================= -->
    <div id="prognosticos" class="section">
      <h2>Prognósticos</h2>

      <label>Selecionar Jornada</label>
      <select id="selectJornadaPrognosticos" onchange="carregarPrognosticosJornada()"></select>

      <div style="display: flex; gap: 20px; margin-top: 20px;">
        
        <!-- COLUNA ESQUERDA: JOGADORES FIXOS -->
        <div style="width: 220px;">
          <h3>Jogadores</h3>
          <div id="listaJogadoresFixos"></div>
        </div>

        <!-- COLUNA DIREITA: 4 CARDS DOS JOGOS -->
        <div style="flex: 1; overflow-x: auto;">
          <div id="cardsJogos"></div>
        </div>

      </div>
    </div>

  </div>

  <script>

    function mostrarSecao(id) {
      document.querySelectorAll('.section').forEach(sec => sec.style.display = 'none');
      document.getElementById(id).style.display = 'block';

      if (id === "prognosticos") carregarPrognosticosJornada();
    }

    /* ============================
         PROGNÓSTICOS
    ============================= */

    const jogadoresFixos = [
      "André David",
      "António Silva",
      "Bruno Marques"
    ];

    const selectJornadaPrognosticos = document.getElementById("selectJornadaPrognosticos");

    for (let i = 1; i <= 34; i++) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = "Jornada " + i;
      selectJornadaPrognosticos.appendChild(opt);
    }

    function mostrarJogadoresFixos() {
      const div = document.getElementById("listaJogadoresFixos");
      let html = "<ul>";
      jogadoresFixos.forEach(j => html += `<li>${j}</li>`);
      html += "</ul>";
      div.innerHTML = html;
    }

    async function carregarPrognosticosJornada() {
      mostrarJogadoresFixos();

      const jornada = Number(selectJornadaPrognosticos.value);
      const res = await fetch("/jogos");
      const jogos = await res.json();

      const jogosDaJornada = jogos.filter(j => j.jornada === jornada);

      const cardsDiv = document.getElementById("cardsJogos");
      cardsDiv.innerHTML = "";

      jogosDaJornada.forEach((jogo, jogoIndex) => {
        let resultadoReal = "Sem resultado";

        if (jogo.golosCasa !== undefined && jogo.golosFora !== undefined) {
          resultadoReal = `${jogo.golosCasa} - ${jogo.golosFora}`;
        }

        let tabela = `
          <table class="tabelaPrognosticos">
            <tr><th>Jogador</th><th>Prognóstico</th></tr>
        `;

        jogadoresFixos.forEach(jogador => {
          tabela += `
            <tr>
              <td>${jogador}</td>
              <td>
                <input type="number" min="0" id="progCasa_${jogoIndex}_${jogador}" 
                  oninput="guardarPrognostico('${jogador}', ${jogoIndex})">
                -
                <input type="number" min="0" id="progFora_${jogoIndex}_${jogador}" 
                  oninput="guardarPrognostico('${jogador}', ${jogoIndex})">
              </td>
            </tr>
          `;
        });

        tabela += "</table>";

        const card = `
          <div class="cardJogo">
            <h3>${jogo.casa} vs ${jogo.fora}</h3>
            <div class="resultadoReal">Resultado Real: ${resultadoReal}</div>
            ${tabela}
          </div>
        `;

        cardsDiv.innerHTML += card;
      });
    }

    async function guardarPrognostico(jogador, jogoIndex) {
      const jornada = Number(selectJornadaPrognosticos.value);

      const resJogos = await fetch("/jogos");
      const jogos = await resJogos.json();
      const jogosDaJornada = jogos.filter(j => j.jornada === jornada);
      const jogo = jogosDaJornada[jogoIndex];

      const progCasa = Number(document.getElementById(`progCasa_${jogoIndex}_${jogador}`).value);
      const progFora = Number(document.getElementById(`progFora_${jogoIndex}_${jogador}`).value);

      if (isNaN(progCasa) || isNaN(progFora)) return;

      const body = {
        jogador,
        jornada,
        casa: jogo.casa,
        fora: jogo.fora,
        progCasa,
        progFora
      };

      await fetch("/add-prognostico", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
    }

    mostrarSecao('prognosticos');

  </script>

</body>
</html>
