<!DOCTYPE html>
<html>
<head>
  <title>Painel Admin</title>
</head>
<body>

  <h1>Painel Admin</h1>

  <!-- JOGADOR -->
  <h2>Adicionar jogador</h2>
  <input id="nome" placeholder="Nome">
  <button onclick="addPlayer()">Adicionar jogador</button>

  <!-- JOGO -->
  <h2>Criar jogo</h2>
  <input id="casa" placeholder="Equipa casa">
  <input id="fora" placeholder="Equipa fora">
  <button onclick="addMatch()">Adicionar jogo</button>

  <script>
    // adicionar jogador
    function addPlayer() {
      fetch("/add-player", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ nome: nome.value })
      }).then(() => alert("Jogador adicionado"));
    }

    // adicionar jogo
    function addMatch() {
      fetch("/add-match", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          casa: casa.value,
          fora: fora.value
        })
      }).then(() => alert("Jogo criado"));
    }
  </script>
<h2>Inserir palpite</h2>
<input id="player_id" placeholder="ID jogador">
<input id="match_id" placeholder="ID jogo">
<input id="palpiteCasa" placeholder="Golos casa">
<input id="palpiteFora" placeholder="Golos fora">
<button onclick="addPrediction()">Adicionar palpite</button>

<h2>Inserir resultado real</h2>
<input id="resMatchId" placeholder="ID jogo">
<input id="resCasa" placeholder="Golos casa">
<input id="resFora" placeholder="Golos fora">
<button onclick="setResult()">Inserir resultado</button>
  
</body>
</html>
