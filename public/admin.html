<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin - Liga Portuguesa</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      padding: 20px;
    }

    h1 {
      color: #f97316;
      margin-bottom: 10px;
    }

    .section {
      background: #1e293b;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 25px;
      border: 1px solid #334155;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 6px;
      border: none;
      background: #334155;
      color: white;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background: #1d4ed8;
    }

    .msg {
      margin-top: 10px;
      padding: 10px;
      background: #22c55e;
      color: black;
      border-radius: 6px;
      display: none;
    }
  </style>
</head>

<body>

  <h1>Painel de Administração</h1>

  <!-- ============================
       CRIAR JOGO (ATUALIZADO)
  ============================= -->
  <div class="section">
    <h2>Criar Jogo</h2>

    <label>Jornada</label>
    <select id="jornada">
      <!-- Jornadas 1 a 34 -->
      ${Array.from({ length: 34 }, (_, i) => `<option value="${i+1}">Jornada ${i+1}</option>`).join("")}
    </select>

    <label>Equipa da Casa</label>
    <input id="casa" type="text">

    <label>Equipa de Fora</label>
    <input id="fora" type="text">

    <button onclick="addJogo()">Criar Jogo</button>
    <div id="msgJogo" class="msg"></div>
  </div>

  <script>
    function showMsg(id, texto) {
      const div = document.getElementById(id);
      div.innerText = texto;
      div.style.display = "block";
      setTimeout(() => div.style.display = "none", 3000);
    }

    async function addJogo() {
      const body = {
        jornada: Number(document.getElementById("jornada").value),
        casa: document.getElementById("casa").value,
        fora: document.getElementById("fora").value
      };

      const res = await fetch("/add-jogo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await res.json();
      showMsg("msgJogo", "Jogo criado com sucesso!");
    }
  </script>

</body>
</html>
