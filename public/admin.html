<!DOCTYPE html>
<html>
<head>
  <title>Painel Admin</title>
</head>
<body>

<h1>Painel Admin</h1>

<h2>Jogadores</h2>
<ul id="listaJogadores"></ul>

<h2>Criar jogo</h2>
<input id="casa" placeholder="Casa">
<input id="fora" placeholder="Fora">
<button onclick="addMatch()">Criar</button>

<h2>Jogos</h2>
<ul id="listaJogos"></ul>

<h2>Palpite</h2>
<select id="playerSelect"></select>
<select id="matchSelect"></select>

<input id="palpiteCasa" placeholder="Casa">
<input id="palpiteFora" placeholder="Fora">

<button onclick="addPrediction()">Guardar palpite</button>

<h2>Resultado</h2>
<select id="resultMatchSelect"></select>

<input id="resCasa">
<input id="resFora">

<button onclick="setResult()">Inserir resultado</button>

<script>

// jogadores
function loadPlayers() {
  fetch("/players")
    .then(res => res.json())
    .then(data => {

      const select = document.getElementById("playerSelect");
      const lista = document.getElementById("listaJogadores");

      select.innerHTML = "";
      lista.innerHTML = "";

      data.forEach(p => {

        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = p.nome;
        select.appendChild(opt);

        const li = document.createElement("li");
        li.textContent = p.nome;
        lista.appendChild(li);
      });
    });
}

// jogos
function loadMatches() {
  fetch("/matches")
    .then(res => res.json())
    .then(data => {

      const mSel = document.getElementById("matchSelect");
      const rSel = document.getElementById("resultMatchSelect");
      const lista = document.getElementById("listaJogos");

      mSel.innerHTML = "";
      rSel.innerHTML = "";
      lista.innerHTML = "";

      data.forEach(m => {

        const texto = m.casa + " vs " + m.fora;

        // dropdowns
        let o1 = document.createElement("option");
        o1.value = m.id;
        o1.textContent = texto;
        mSel.appendChild(o1);

        let o2 = document.createElement("option");
        o2.value = m.id;
        o2.textContent = texto;
        rSel.appendChild(o2);

        // lista
        let li = document.createElement("li");

        if (m.golos_casa == null) {
          li.textContent = texto + " ⏳";
        } else {
          li.textContent =
            texto + " ✅ " + m.golos_casa + "-" + m.golos_fora;
        }

        lista.appendChild(li);
      });
    });
}

function addMatch() {
  fetch("/add-match", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      casa: casa.value,
      fora: fora.value
    })
  })
  .then(() => {
    alert("Jogo criado");
    loadMatches();
  });
}

function addPrediction() {
  fetch("/add-prediction", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      player_id: parseInt(playerSelect.value),
      match_id: parseInt(matchSelect.value),
      palpite_casa: parseInt(palpiteCasa.value),
      palpite_fora: parseInt(palpiteFora.value)
    })
  })
  .then(() => alert("Palpite guardado"));
}

function setResult() {
  fetch("/result/" + resultMatchSelect.value, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      casa: parseInt(resCasa.value),
      fora: parseInt(resFora.value)
    })
  })
  .then(() => {
    alert("Resultado inserido");
    loadMatches();
  });
}

loadPlayers();
loadMatches();

</script>

</body>
</html>
