<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin - Liga Portuguesa</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #1e293b;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      border-right: 2px solid #334155;
      position: fixed;
    }

    .sidebar h2 {
      color: #f97316;
      margin-bottom: 20px;
    }

    .sidebar button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      text-align: left;
    }

    .sidebar button:hover {
      background: #1d4ed8;
    }

    .content {
      margin-left: 240px;
      padding: 20px;
      width: 100%;
    }

    .section {
      background: #1e293b;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 25px;
      border: 1px solid #334155;
      display: none;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 6px;
      border: none;
      background: #334155;
      color: white;
    }

    button.action {
      margin-top: 15px;
      padding: 10px 15px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }

    button.action:hover {
      background: #1d4ed8;
    }

    /* Botão pill suave */
    .deleteBtn {
      background: #f87171;
      color: #1e293b;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }

    .deleteBtn:hover {
      background: #ef4444;
      color: white;
    }

    .msg {
      margin-top: 10px;
      padding: 10px;
      background: #22c55e;
      color: black;
      border-radius: 6px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2>Admin</h2>
    <button onclick="mostrarSecao('criarJogo')">Criar Jogos</button>
    <button onclick="mostrarSecao('verJogos')">Resultados dos Jogos</button>
  </div>

  <div class="content">

    <!-- ============================
         CRIAR JOGO
    ============================= -->
    <div id="criarJogo" class="section">
      <h2>Criar Jogo</h2>

      <label>Jornada</label>
      <select id="jornada"></select>

      <label>Equipa da Casa</label>
      <input id="casa" type="text">

      <label>Equipa de Fora</label>
      <input id="fora" type="text">

      <button class="action" onclick="addJogo()">Criar Jogo</button>
      <div id="msgJogo" class="msg"></div>

      <h3>Jogos Criados</h3>
      <div id="listaCriarJogos"></div>
    </div>

    <!-- ============================
         RESULTADOS DOS JOGOS
    ============================= -->
    <div id="verJogos" class="section">
      <h2>Resultados dos Jogos</h2>

      <p>Insere os resultados corretos dos jogos. Os jogos mais recentes aparecem primeiro.</p>

      <div id="listaResultados"></div>
    </div>

  </div>

  <script>
    function mostrarSecao(id) {
      document.querySelectorAll('.section').forEach(sec => sec.style.display = 'none');
      document.getElementById(id).style.display = 'block';

      if (id === "criarJogo") carregarJogosCriados();
      if (id === "verJogos") carregarResultados();
    }

    const jornadaSelect = document.getElementById("jornada");

    for (let i = 1; i <= 34; i++) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = "Jornada " + i;
      jornadaSelect.appendChild(opt);
    }

    function showMsg(id, texto) {
      const div = document.getElementById(id);
      div.innerText = texto;
      div.style.display = "block";
      setTimeout(() => div.style.display = "none", 3000);
    }

    async function addJogo() {
      const body = {
        jornada: Number(document.getElementById("jornada").value),
        casa: document.getElementById("casa").value,
        fora: document.getElementById("fora").value
      };

      await fetch("/add-jogo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      showMsg("msgJogo", "Jogo criado com sucesso!");
      carregarJogosCriados();
    }

    async function carregarJogosCriados() {
      const listaDiv = document.getElementById("listaCriarJogos");

      const res = await fetch("/jogos");
      const jogos = await res.json();

      let html = "<ul>";
      for (let i = jogos.length - 1; i >= 0; i--) {
        const j = jogos[i];
        html += `
          <li>
            Jornada ${j.jornada}: ${j.casa} vs ${j.fora}
            <button class="deleteBtn" onclick="apagarJogo(${i})">Apagar</button>
          </li>`;
      }
      html += "</ul>";

      listaDiv.innerHTML = html;
    }

    async function apagarJogo(index) {
      const res = await fetch("/delete-jogo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ index })
      });

      const data = await res.json();
      if (data.success) {
        carregarJogosCriados();
      } else {
        alert("Erro ao apagar jogo.");
      }
    }

    /* ============================
         RESULTADOS DOS JOGOS
    ============================= */

    async function carregarResultados() {
      const listaDiv = document.getElementById("listaResultados");

      const res = await fetch("/jogos");
      const jogos = await res.json();

      const ordenados = jogos.slice().sort((a, b) => b.jornada - a.jornada);

      let html = "";

      ordenados.forEach((j, index) => {
        html += `
          <div style="margin-bottom: 15px; padding: 15px; background: #334155; border-radius: 8px;">
            <h3>Jornada ${j.jornada}</h3>
            <p><strong>${j.casa}</strong> vs <strong>${j.fora}</strong></p>

            <label>Golos ${j.casa}</label>
            <input id="golosCasa_${index}" type="number" min="0" style="width: 80px;">

            <label>Golos ${j.fora}</label>
            <input id="golosFora_${index}" type="number" min="0" style="width: 80px;">

            <button class="action" onclick="guardarResultado(${index})">Guardar Resultado</button>
          </div>
        `;
      });

      listaDiv.innerHTML = html;

      window.jogosOrdenados = ordenados;
    }

    async function guardarResultado(index) {
      const jogo = window.jogosOrdenados[index];

      const golosCasa = Number(document.getElementById(`golosCasa_${index}`).value);
      const golosFora = Number(document.getElementById(`golosFora_${index}`).value);

      const body = {
        jornada: jogo.jornada,
        casa: jogo.casa,
        fora: jogo.fora,
        golosCasa,
        golosFora
      };

      const res = await fetch("/update-resultado", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (data.success) {
        alert("Resultado guardado com sucesso!");
      } else {
        alert("Erro ao guardar resultado.");
      }
    }

    mostrarSecao('criarJogo');
  </script>

</body>
</html>
